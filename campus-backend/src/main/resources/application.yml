server:
  port: 8082

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/campus_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf-8
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
file:
  upload-path: D:/campus_uploads/
  access-path: /uploads/**
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath:/mapper/*.xml
knife4j:
  enable: true
  production: false

# 微信小程序配置（需从微信开放平台获取）
wechat:
  appid: ${WECHAT_APPID:}
  appsecret: ${WECHAT_APPSECRET:}
  token: ${WECHAT_TOKEN:campus_lost_found}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never