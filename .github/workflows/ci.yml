name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ── 后端：Java 17 + Maven 编译 ──────────────────────────────────────────
  backend-build:
    name: Backend Build (Java 17)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven (skip tests, no MySQL needed)
        working-directory: campus-backend
        run: mvn -B package -DskipTests --no-transfer-progress

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: campus-backend-jar
          path: campus-backend/target/*.jar
          retention-days: 7

  # ── 前端：Node.js + Vue CLI 构建 ────────────────────────────────────────
  frontend-build:
    name: Frontend Build (Node.js)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: campus-frontend/package-lock.json

      - name: Install dependencies
        working-directory: campus-frontend
        run: npm ci

      - name: Build production bundle
        working-directory: campus-frontend
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: campus-frontend-dist
          path: campus-frontend/dist/
          retention-days: 7
